name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KCH=$RUNNER_TEMP/app.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERT
          CERT_SIZE=$(wc -c < $CERT | tr -d ' ')
          echo "Cert size: $CERT_SIZE bytes"
          if [ "$CERT_SIZE" -lt 100 ]; then
            echo "ERROR: Certificate file is too small ($CERT_SIZE bytes). The BUILD_CERTIFICATE_BASE64 secret is likely empty or corrupt."
            exit 1
          fi
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KCH
          security set-keychain-settings -lut 21600 $KCH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KCH
          security import $CERT -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KCH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KCH
          security list-keychain -d user -s $KCH
          echo "=== Identities in keychain ==="
          security find-identity -v -p codesigning $KCH

      - name: Install Provisioning Profile
        run: |
          PP_UUID="8180c4e4-1cd2-4bb5-9d4c-f71ae69f7970"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          base64 --decode < .github/profile_b64.txt > ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          PP_SIZE=$(wc -c < ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision | tr -d ' ')
          echo "Profile installed: ${PP_UUID}"
          echo "Profile size: $PP_SIZE bytes"
          if [ "$PP_SIZE" -lt 100 ]; then
            echo "ERROR: Profile file is too small ($PP_SIZE bytes). Decode may have failed."
            exit 1
          fi
          echo "=== Profile name ==="
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision 2>/dev/null | grep -A1 '<key>Name</key>' || echo "Could not read profile name"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Patch Project for Manual Signing
        run: |
          echo "=== Before patch ==="
          grep -n 'CODE_SIGN_STYLE\|PROVISIONING_PROFILE' CropsIntel.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' CropsIntel.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = 754P32CRTB;/DEVELOPMENT_TEAM = 754P32CRTB; PROVISIONING_PROFILE_SPECIFIER = "CropsIntel AppStore Distribution";/g' CropsIntel.xcodeproj/project.pbxproj
          echo "=== After patch ==="
          grep -n 'CODE_SIGN_STYLE\|PROVISIONING_PROFILE' CropsIntel.xcodeproj/project.pbxproj || true

      - name: Build Archive
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KCH=$RUNNER_TEMP/app.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KCH
          echo "=== Code signing identity ==="
          security find-identity -v -p codesigning $KCH
          xcodebuild archive \
            -project CropsIntel.xcodeproj \
            -scheme CropsIntel \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/CropsIntel.xcarchive \
            DEVELOPMENT_TEAM=754P32CRTB \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="CropsIntel AppStore Distribution" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KCH"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/export.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>754P32CRTB</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.cropsintel.app</key>
              <string>CropsIntel AppStore Distribution</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/CropsIntel.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/CropsIntel.ipa \
            --apiKey $ASC_KEY_ID \
            --apiIssuer $ASC_ISSUER

      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app.keychain-db || true
