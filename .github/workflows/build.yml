name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Install Certificate
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERT=$RUNNER_TEMP/cert.p12
        KCH=$RUNNER_TEMP/app.keychain-db
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KCH
        security set-keychain-settings -lut 21600 $KCH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KCH
        security import $CERT -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KCH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KCH
        security list-keychain -d user -s $KCH

    - name: Install Provisioning Profile
      env:
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      run: |
        PP=$RUNNER_TEMP/pp.mobileprovision
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP ~/Library/MobileDevice/Provisioning\ Profiles

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project CropsIntel.xcodeproj \
          -scheme CropsIntel \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $RUNNER_TEMP/CropsIntel.xcarchive \
          DEVELOPMENT_TEAM=754P32CRTB \
          CODE_SIGN_STYLE=Automatic

    - name: Export IPA
      run: |
        printf '<?xml version="1.0"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>teamID</key><string>754P32CRTB</string></dict></plist>' > $RUNNER_TEMP/export.plist
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/CropsIntel.xcarchive \
          -exportOptionsPlist $RUNNER_TEMP/export.plist \
          -exportPath $RUNNER_TEMP/export

    - name: Upload to TestFlight
      env:
        ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
        xcrun altool --upload-app \
          --type ios \
          --file $RUNNER_TEMP/export/CropsIntel.ipa \
          --apiKey $ASC_KEY_ID \
          --apiIssuer $ASC_ISSUER

    - name: Cleanup
      if: always()
      run: security delete-keychain $RUNNER_TEMP/app.keychain-db || true
