name: Build and Upload to App Store
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          KCH=$RUNNER_TEMP/app.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 -d > $CERT
          echo "Cert size: $(wc -c < $CERT) bytes"
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KCH
          security set-keychain-settings -lut 21600 $KCH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KCH
          security import $CERT -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KCH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KCH
          security list-keychain -d user -s $KCH
          echo "=== Identities in keychain ==="
          security find-identity -v -p codesigning $KCH

      - name: Install Provisioning Profile
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/pp.mobileprovision
          echo -n "$MOBILEPROVISION_BASE64" | base64 -d > $PP_PATH
          echo "Profile size: $(wc -c < $PP_PATH) bytes"
          security cms -D -i $PP_PATH -o $RUNNER_TEMP/pp.plist
          echo "=== Profile fields ==="
          /usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/pp.plist
          /usr/libexec/PlistBuddy -c "Print :Name" $RUNNER_TEMP/pp.plist
          /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" $RUNNER_TEMP/pp.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/pp.plist)
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" $RUNNER_TEMP/pp.plist)
          echo "PP_UUID=$UUID" >> $GITHUB_ENV
          echo "PP_NAME=$NAME" >> $GITHUB_ENV
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PP_PATH" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "=== Installed profiles ==="
          ls -la "$PROFILES_DIR/"

      - name: Build Archive
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KCH=$RUNNER_TEMP/app.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KCH
          echo "=== Code signing identity ==="
          security find-identity -v -p codesigning $KCH
          echo "=== Using profile UUID: $PP_UUID ==="
          echo "=== Using profile name: $PP_NAME ==="
          xcodebuild archive \
            -project CropsIntel.xcodeproj \
            -scheme CropsIntel \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/CropsIntel.xcarchive \
            DEVELOPMENT_TEAM=754P32CRTB \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KCH"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          ASC_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          cat > $RUNNER_TEMP/export.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>754P32CRTB</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.cropsintel.app</key>
              <string>$PP_NAME</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/CropsIntel.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/export/CropsIntel.ipa \
            --apiKey $ASC_KEY_ID \
            --apiIssuer $ASC_ISSUER

      - name: Cleanup
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app.keychain-db || true
